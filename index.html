<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rico · Visual Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}

body{
  background:#010812;
  font-family:'Rajdhani',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* ── RAIN ── */
#rain{position:fixed;inset:0;pointer-events:none;z-index:2}
.drop{
  position:absolute;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(100,180,255,.3));
  animation:fall linear infinite;
}
@keyframes fall{from{transform:translateY(-100px);opacity:.6}to{transform:translateY(110vh);opacity:0}}

/* ── CITY LAYERS ── */
.city-layer{position:fixed;bottom:0;width:100%;pointer-events:none}
.city-bg{z-index:3;opacity:.4;animation:drift 22s ease-in-out infinite alternate}
.city-mid{z-index:4;opacity:.65;animation:drift 14s ease-in-out infinite alternate-reverse}
.city-fg{z-index:5;opacity:.88;animation:drift 8s ease-in-out infinite alternate}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-18px)}}

.ground-glow{
  position:fixed;bottom:0;left:0;right:0;height:130px;
  background:linear-gradient(to top,rgba(255,20,80,.1) 0%,rgba(0,200,255,.06) 50%,transparent 100%);
  z-index:6;pointer-events:none;
}
.fog{
  position:fixed;top:0;left:-10%;right:-10%;height:55%;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,60,120,.2) 0%,transparent 70%);
  z-index:7;pointer-events:none;
  animation:fog-drift 18s ease-in-out infinite alternate;
}
@keyframes fog-drift{from{transform:translateX(-5%)}to{transform:translateX(5%)}}

/* ── PAGE SCANLINES ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:200;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);
}

/* ── NEON SIGNS ── */
.nsign{
  position:fixed;font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:.15em;pointer-events:none;z-index:9;
  animation:sign-flicker 7s steps(1) infinite;
}
.nc{color:#00e5ff;text-shadow:0 0 6px #00e5ff,0 0 14px #00e5ff88}
.np{color:#ff0066;text-shadow:0 0 6px #ff0066,0 0 14px #ff006688}
.na{color:#ffaa00;text-shadow:0 0 6px #ffaa00,0 0 14px #ffaa0088}
@keyframes sign-flicker{0%,74%,76%,100%{opacity:1}75%{opacity:.1}}

/* ── HOLOGRAM ── */
.holo-wrap{
  position:fixed;bottom:0;left:3%;
  width:clamp(140px,18vw,220px);
  z-index:8;
  animation:holo-float 5s ease-in-out infinite;
  transform-origin:bottom center;
}
@keyframes holo-float{
  0%,100%{transform:translateY(0) rotate(-.4deg)}
  50%{transform:translateY(-16px) rotate(.4deg)}
}
.holo-img{
  width:100%;display:block;
  filter:grayscale(1) brightness(1.1) contrast(1.3) sepia(1) hue-rotate(150deg) saturate(8) brightness(.72);
  animation:holo-flicker 5s steps(1) infinite;
  -webkit-mask-image:linear-gradient(to top,transparent 0%,black 18%,black 80%,transparent 100%);
  mask-image:linear-gradient(to top,transparent 0%,black 18%,black 80%,transparent 100%);
}
@keyframes holo-flicker{0%,87%,89%,93%,95%,100%{opacity:1}88%{opacity:.12}94%{opacity:.45}}
.holo-scan{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,229,255,.08) 2px,rgba(0,229,255,.08) 3px);
  animation:scan 2s linear infinite;
}
@keyframes scan{from{background-position:0 0}to{background-position:0 30px}}
.holo-glow{
  position:absolute;inset:-20px;pointer-events:none;
  background:radial-gradient(ellipse at center 60%,rgba(0,229,255,.1) 0%,transparent 65%);
  animation:hpulse 4s ease-in-out infinite;
}
@keyframes hpulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ── MAIN CONTENT ── */
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem 3rem;
}

.sys-label{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:.35em;
  color:rgba(0,229,255,.5);text-transform:uppercase;
  margin-bottom:1rem;
  animation:fadein 1s ease forwards;opacity:0;animation-delay:.3s;
}

/* name */
.name-wrap{position:relative;text-align:center;line-height:.9;margin-bottom:.5rem}
.name-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(58px,13vw,96px);
  color:#fff;letter-spacing:.1em;display:block;
  animation:name-up .8s cubic-bezier(.22,1,.36,1) forwards;
  opacity:0;transform:translateY(24px);animation-delay:.6s;
}
.name-main::before,.name-main::after{
  content:'RICO';
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(58px,13vw,96px);letter-spacing:.1em;pointer-events:none;
}
.name-main::before{color:#ff0066;clip-path:polygon(0 20%,100% 20%,100% 38%,0 38%);animation:glr 5s steps(1) infinite;opacity:0}
.name-main::after{color:#00e5ff;clip-path:polygon(0 62%,100% 62%,100% 76%,0 76%);animation:glb 5s steps(1) infinite;animation-delay:.15s;opacity:0}
@keyframes glr{0%,92%,100%{transform:translateX(-50%);opacity:0}93%{transform:translateX(calc(-50% - 4px));opacity:.7}95%{transform:translateX(calc(-50% + 3px));opacity:.7}97%{transform:translateX(-50%);opacity:0}}
@keyframes glb{0%,92%,100%{transform:translateX(-50%);opacity:0}93%{transform:translateX(calc(-50% + 5px));opacity:.7}96%{transform:translateX(calc(-50% - 2px));opacity:.7}98%{transform:translateX(-50%);opacity:0}}
@keyframes name-up{to{opacity:1;transform:translateY(0)}}

/* rule */
.neon-rule{
  width:0;height:1px;
  background:linear-gradient(to right,transparent,#00e5ff,#ff0066,transparent);
  margin:.7rem auto;
  animation:rule-grow .8s ease forwards;animation-delay:1.1s;
}
@keyframes rule-grow{to{width:min(340px,72vw)}}

/* tagline */
.tagline{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px,2vw,11px);letter-spacing:.28em;
  color:rgba(255,255,255,.48);text-transform:uppercase;text-align:center;
  animation:fadein .8s ease forwards;opacity:0;animation-delay:1.3s;
  margin-bottom:1.2rem;
}

/* badges */
.badges{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  animation:fadein .8s ease forwards;opacity:0;animation-delay:1.5s;
  margin-bottom:2rem;
}
.badge{
  font-family:'Share Tech Mono',monospace;font-size:8px;
  letter-spacing:.18em;padding:4px 10px;border:.5px solid;text-transform:uppercase;
}
.bc{color:#00e5ff;border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.06)}
.bp{color:#ff0066;border-color:rgba(255,0,102,.4);background:rgba(255,0,102,.06)}
.ba{color:#ffaa00;border-color:rgba(255,170,0,.4);background:rgba(255,170,0,.06)}

/* links */
.links{
  display:flex;flex-direction:column;gap:10px;
  width:min(380px,88vw);
  animation:fadein .8s ease forwards;opacity:0;animation-delay:1.8s;
}
.link-panel{
  position:relative;display:flex;align-items:center;gap:14px;
  padding:13px 18px;text-decoration:none;overflow:hidden;
  transition:background .2s,border-color .2s;
}
.link-panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.link-panel:hover .arrow{transform:translateX(5px)}

.lp{border:.5px solid rgba(255,0,102,.3);background:rgba(255,0,102,.04)}
.lp::before{background:#ff0066;box-shadow:0 0 8px #ff0066}
.lp:hover{background:rgba(255,0,102,.1);border-color:rgba(255,0,102,.7)}

.lc{border:.5px solid rgba(0,229,255,.3);background:rgba(0,229,255,.04)}
.lc::before{background:#00e5ff;box-shadow:0 0 8px #00e5ff}
.lc:hover{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.7)}

.link-icon svg{width:20px;height:20px}
.link-text{display:flex;flex-direction:column;gap:2px}
.handle{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;color:#fff;letter-spacing:.08em}
.sub{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase}
.lp .sub{color:rgba(255,0,102,.6)}.lc .sub{color:rgba(0,229,255,.6)}
.arrow{margin-left:auto;font-size:13px;font-family:'Share Tech Mono',monospace;transition:transform .2s}
.lp .arrow{color:rgba(255,0,102,.6)}.lc .arrow{color:rgba(0,229,255,.6)}

/* corner brackets */
.b{position:absolute;width:8px;height:8px;border-style:solid;opacity:.6}
.btl{top:-1px;left:-1px;border-width:1px 0 0 1px}
.btr{top:-1px;right:-1px;border-width:1px 1px 0 0}
.bbl{bottom:-1px;left:-1px;border-width:0 0 1px 1px}
.bbr{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
.lp .b{border-color:#ff0066}.lc .b{border-color:#00e5ff}

/* coord */
.coord{
  margin-top:1.8rem;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.14);letter-spacing:.2em;text-align:center;
  animation:fadein 1s ease forwards;opacity:0;animation-delay:2.2s;
}

/* ── LOGO ── */
.logo-wrap {
  position: fixed;
  top: 20px;
  left: 24px;
  z-index: 50;
  width: 120px;
  height: 120px;
  perspective: 400px;  /* ← add this */
  animation: logo-spin 8s linear infinite, logo-flicker 6s steps(1) infinite;
  filter: drop-shadow(0 0 6px #00e5ff) drop-shadow(0 0 18px #00e5ff66);
}
.logo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: brightness(0) invert(1) sepia(1) hue-rotate(150deg) saturate(4) brightness(0.9);
}
@keyframes logo-spin {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}
@keyframes logo-flicker {
  0%,88%,90%,100% { opacity: 1; }
  89% { opacity: 0.3; }
}

@keyframes fadein{to{opacity:1}}
</style>
</head>
